services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: saralsambidhan-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/faiss_index:/app/faiss_index  # Persists vector database
      - ./backend/resources:/app/resources      # PDF storage
    environment:
      - PDF_PATH=/app/resources/Constitution.pdf
      - FAISS_INDEX=/app/faiss_index/index.faiss
    restart: always

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saralsambidhan-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

